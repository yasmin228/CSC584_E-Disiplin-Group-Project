<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <title>Create Counselling Session | E-Disiplin</title>
	<link rel="stylesheet" href="css/styles.css">
	<style>
       body {
            font-family: Tinos, sans-serif;
            background: url("img/background.jpg");
            background-size: cover;     
            background-repeat: no-repeat;
            margin: 0px;
            height: 115vh;               
            display: flex;   
            justify-content: center;    
            align-items: center; 
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            width: 700px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input, textarea {
            width: 95%;
            margin: 8px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
.card-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 20px;
}
.card {
    background: #f9f9f9;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
    width: 150px;          /* control card width */
    box-shadow: 0 0 5px rgba(0,0,0);
}
.button {
    font-family: Tinos, sans-serif;
    background: #527FFA;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 5px;
    display: inline-block; 
    margin: 0px;
    cursor: pointer;
}
.button:hover {
    background: #2C4485;
}
		.card-img {
			width: 20%;
			height: auto;
			object-fit: cover;
			border-radius: 5px 5px 0 0;
			margin-bottom: 0px;
		}
        h1 { 
            text-align: center; 
        }     
            input, select { 
                width: 95%; 
                margin: 8px 0; 
                padding: 10px; 
                border: 1px solid #ccc; 
                border-radius: 5px; 
            }
    .nav-link { 
        display: block; 
        margin-top: 20px; 
        text-align: center; 
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Add Counseling Session</h1>
    <form id="sessionForm">
      <input type="text" id="appointmentId" placeholder="Appointment ID" required>
      <input type="date" id="sessionDate" required>
      <textarea id="sessionNotes" placeholder="Session Notes" required></textarea>
      <textarea id="recommendation" placeholder="Recommendation"></textarea>
      <select id="completionStatus" required>
        <option value="">Select Completion Status</option>
        <option value="Completed">Completed</option>
        <option value="In Progress">In Progress</option>
        <option value="Missed">Missed</option>
      </select>
      <button type="submit" class="button">Save Session</button>
    </form>
    <a href="session-list.html" class="nav-link">Go to Session List</a>
  </div>
</body>
</html>
